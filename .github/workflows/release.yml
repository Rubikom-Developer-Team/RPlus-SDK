name: SDK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v), e.g. 1.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG="v${VERSION}"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"
          echo "Package version: ${VERSION}"

      - name: Restore
        run: dotnet restore RPlus.PartnerSdk-dotnet.sln

      - name: Build
        run: dotnet build RPlus.PartnerSdk-dotnet.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/RPlus.PartnerSdk.Tests/RPlus.PartnerSdk.Tests.csproj -c Release --no-build

      - name: Pack RPlus.PartnerSdk
        run: >
          dotnet pack src/RPlus.PartnerSdk/RPlus.PartnerSdk.csproj
          -c Release
          --no-build
          -o artifacts
          -p:PackageVersion=${{ steps.ver.outputs.version }}
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg

      - name: Pack RPlus.PartnerSdk.Sqlite
        run: >
          dotnet pack src/RPlus.PartnerSdk.Sqlite/RPlus.PartnerSdk.Sqlite.csproj
          -c Release
          --no-build
          -o artifacts
          -p:PackageVersion=${{ steps.ver.outputs.version }}
          -p:IncludeSymbols=true
          -p:SymbolPackageFormat=snupkg

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Publish to NuGet (optional)
        if: ${{ secrets.NUGET_API_KEY != '' }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
